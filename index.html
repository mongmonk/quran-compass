<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="A comprehensive Quran reading and navigation application" />
    <link rel="apple-touch-icon" href="/icon_180.png" />
    <link rel="icon" href="/icon_180.png" sizes="any" />
    <title>Quran Compass</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Mulish:wght@400;700;800&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: 'Mulish', sans-serif;
      }
      .font-arabic {
        font-family: 'Amiri', serif;
      }
      /* Arabic honorific ligatures (e.g. ﵇ ﵁ ﷺ) rendered inline within
         Latin text. Scheherazade New reliably covers the Unicode 14.0
         honorific block; Amiri is a fallback. */
      .font-honorific {
        font-family: 'Scheherazade New', 'Amiri', serif;
        font-size: 1.3em;
        line-height: 1;
      }
    </style>
    <script>
      // Configure Tailwind to use the 'class' strategy for dark mode
      tailwind.config = {
        darkMode: 'class',
      }

      // Apply theme on initial load to prevent flash of unstyled content
      if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    </script>
  <script type="importmap">

    "react/": "https://aistudiocdn.com/react@^19.2.0/",

    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
</script>

</head>
